name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel any in-flight runs for the same branch/PR when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # vitest 3 (this package's test runner) requires Node 20+, so the
        # test matrix starts at 20. The library itself (zero runtime deps,
        # pure ES) still runs on Node 18+ at runtime.
        node: [20, 22]
        os: [ubuntu-latest]
        # Also smoke-test the supported LTS on Windows so path/CRLF
        # regressions are caught before they ship.
        include:
          - node: 20
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: yarn

      - name: Install dependencies
        run: yarn install

      - name: Run tests
        run: yarn test
